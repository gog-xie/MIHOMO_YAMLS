 策略组me: Mihomo Rule Set All In One
# Link: https://github.com/gog-xie/Mihomo/blob/main/yaml/RuleAIO.yaml
# Designer: gog-xie
# Version: v2-1.2
# Date: 2026-06-09

# 配置说明：
# 1) 本配置采用四层策略,层次功能分明,故转层负责节点是否可用,地区策略层负责节点选择的形式,即分流策略组→故障转移→全球手动→地区策略→均衡or自动or手动,所以大部分流策略组默认为故障转移,故障转移首选为"全球手动",可自定义喜欢的节点,当"全球手动"的节点失联时,自动切换至可用节点,实现长时免维护；
#    这里需注意的是,"全球手动"的节点失联,故转至可用节点后,当"全球手动"的节点恢复时,短时间不会自动跳转回"全球手动"的节点,若有强迫症,手动选择一下"全球手动",可能是Fallback的小bug。
# 2) 需要全防泄漏,使用时将分流策略的"漏网之鱼"、“网络测试”和“默认直连”选择为任意代理节点即可(实际意义并不大)。
# 3) 关于"默认直连"策略组,主要挂载了geolocation-!cn非中国域名,它包含了gfw被墙域名,以及其他几乎未被墙的境外域名,含有如cloudflare、cloudfront、fastly等CDN站点,由于先滤掉了gfw被墙域名,剩下的几乎未被墙,可根据使用情况切换代理。
# 4) 配置前仔细阅读配置中的相关说明,根据需要自行调整。
# 5) 使用前在“1.6代理提供者”板块中添加你的订阅链接。

# ↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓配置区↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓↓
# 1 锚点配置 
# 1.1 代理提供者锚点 - 订阅源基础配置 (根据自己机场特性,在filter参数中添加不需要的机场节点关键字,若需保留相关节点,删除该节点名称的关键字)
BaseProvider: &BaseProvider {type: http, interval: 86400, proxy: DIRECT, health-check: {enable: true, url: 'https://www.google.com/generate_204', interval: 300}, filter: '^(?!.*(客户端|特殊|如果|导致|一下|教程|测试|剩余|套餐|0.5x|0.1x|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'}

# 1.2策略组类型锚点 - 定义不同的策略组基础配置
BaseFB: &BaseFB {type: fallback, interval: 200, lazy: true, url: 'https://www.google.com/generate_204'}
BaseCH: &BaseCH {type: load-balance, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', strategy: consistent-hashing, hidden: true, include-all: true}
BaseCR: &BaseCR {type: load-balance, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', strategy: round-robin, hidden: true, include-all: true}
BaseUT: &BaseUT {type: url-test, interval: 200, lazy: true, url: 'https://www.google.com/generate_204', hidden: true, include-all: true}

# 1.3 规则集行为锚点
BehaviorDN:    &BehaviorDN {type: http, behavior: domain, format: mrs, interval: 86400}
BehaviorDY:    &BehaviorDY {type: http, behavior: domain, format: yaml, interval: 86400}
BehaviorIP:    &BehaviorIP {type: http, behavior: ipcidr, format: mrs, interval: 86400}
ClassicalText: &ClassicalText {type: http, interval: 86400, behavior: classical, format: text}
ClassicalYaml: &ClassicalYaml {type: http, behavior: classical, interval: 86400, format: yaml, proxy: DIRECT}

# 1.4 节点筛选正则表达式 - 基于地理位置和关键词过滤
FilterHK: &FilterHK '^(?=.*(?i)(港|🇭🇰|HK|Hong|HKG))(?!.*(排除1|排除2|5x)).*$'
FilterSG: &FilterSG '^(?=.*(?i)(坡|🇸🇬|SG|Sing|SIN|XSP))(?!.*(排除1|排除2|5x)).*$'
FilterJP: &FilterJP '^(?=.*(?i)(日|🇯🇵|JP|Japan|NRT|HND|KIX|CTS|FUK))(?!.*(尼日利亚|排除2|5x)).*$'
FilterKR: &FilterKR '^(?=.*(?i)(韩|🇰🇷|韓|首尔|南朝鲜|KR|KOR|Korea|South))(?!.*(排除1|排除2|5x)).*$'
FilterUS: &FilterUS '^(?=.*(?i)(美|🇺🇸|US|USA|JFK|SJC|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD))(?!.*(Plus|Australia|5x)).*$'
FilterTW: &FilterTW '^(?=.*(?i)(台|🇼🇸|🇹🇼|TW|tai|TPE|TSA|KHH))(?!.*(排除1|排除2|5x)).*$'
FilterUK: &FilterUK '^(?=.*(?i)(英|英国|UK|大不列颠|伦敦|Kingdom))(?!.*(排除1|排除2|5x)).*$'
FilterEU: &FilterEU '^(?=.*(?i)(奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|🇬🇧|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU))(?!.*(排除1|排除2|5x)).*$'
FilterOT: &FilterOT '^(?!.*(DIRECT|直接连接|美|港|坡|台|新|日|韩|奥|比|保|克罗地亚|塞|捷|丹|爱沙|芬|法|德|希|匈|爱尔|意|拉|立|卢|马其它|荷|波|葡|罗|斯洛伐|斯洛文|西|瑞|英|🇭🇰|🇼🇸|🇹🇼|🇸🇬|🇯🇵|🇰🇷|🇺🇸|🇬🇧|🇦🇹|🇧🇪|🇨🇿|🇩🇰|🇫🇮|🇫🇷|🇩🇪|🇮🇪|🇮🇹|🇱🇹|🇱🇺|🇳🇱|🇵🇱|🇸🇪|HK|TW|SG|JP|KR|US|GB|CDG|FRA|AMS|MAD|BCN|FCO|MUC|BRU|HKG|TPE|TSA|KHH|SIN|XSP|NRT|HND|KIX|CTS|FUK|JFK|LAX|ORD|ATL|DFW|SFO|MIA|SEA|IAD|LHR|LGW))'
FilterAL: &FilterAL '^(?!.*(DIRECT|直接连接|群|邀请|返利|循环|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author))'

# 1.5 策略组代理锚点 - 预定义的代理节点优先级排序,根据自己需求在“4.1 业务策略组”选定策略组代理模板
SelectPY: &SelectPY {type: select, proxies: [全球手动, 故障转移, 狮城策略, 美国策略, 香港策略, 日本策略, 台湾策略, 韩国策略, 欧盟策略, 冷门策略, 直接连接]}
SelectDC: &SelectDC {type: select, proxies: [默认直连, 默认代理, 故障转移, 狮城策略, 美国策略, 香港策略, 日本策略, 台湾策略, 韩国策略, 欧盟策略, 冷门策略, 全球手动, 直接连接]}
SelectFB: &SelectFB {type: select, proxies: [故障转移, 默认代理, 默认直连, 狮城策略, 美国策略, 香港策略, 日本策略, 台湾策略, 韩国策略, 欧盟策略, 冷门策略, 全球手动, 直接连接]}
SelectHK: &SelectHK {type: select, proxies: [香港策略, 默认代理, 默认直连, 故障转移, 狮城策略, 美国策略, 日本策略, 台湾策略, 韩国策略, 欧盟策略, 冷门策略, 全球手动, 直接连接]}
SelectSG: &SelectSG {type: select, proxies: [狮城策略, 默认代理, 默认直连, 故障转移, 美国策略, 香港策略, 日本策略, 台湾策略, 韩国策略, 欧盟策略, 冷门策略, 全球手动, 直接连接]}
SelectUS: &SelectUS {type: select, proxies: [美国策略, 默认代理, 默认直连, 故障转移, 狮城策略, 香港策略, 日本策略, 台湾策略, 韩国策略, 欧盟策略, 冷门策略, 全球手动, 直接连接]}

# 1.6 代理提供者 
# 注意：请填入机场订阅链接,每个链接一行,并为每个机场命名,视情况启用多个机场。末尾的[主][备]为每个节点添加机场名称前缀,可自定义。
proxy-providers:
  # Airport1订阅源 - 首选机场节点集合，使用时请修改
  Airport1: {<<: *BaseProvider, url: 'Airport1订阅源地址', override: {additional-prefix: '[主] '}}
  # Airport2订阅源 - 次选机场节点集合，使用时请修改
  Airport2: {<<: *BaseProvider, url: 'Airport2订阅源地址', override: {additional-prefix: '[备] '}}

# 2 监听器 
listeners:
  # Shadowsocks监听器 - 代理节点 玩法：远程连接家庭网络,端口和密码,使用时请修改
  - {name: SS-IN,  type: shadowsocks, listen: '::', port: 10000, udp: true, password: Xf3#Lp9WqZ, cipher: aes-256-gcm}
  # Mixed监听器 - 分地区专用端口 玩法：本地浏览器插件或手机APP配置代理,实现分地区访问
  - {name: MIXED-SG, type: mixed, port: 50000, proxy: 狮城策略}
  - {name: MIXED-US, type: mixed, port: 50001, proxy: 美国策略}
  - {name: MIXED-TW, type: mixed, port: 50002, proxy: 台湾策略}
  - {name: MIXED-HK, type: mixed, port: 50003, proxy: 香港策略}
  - {name: MIXED-JP, type: mixed, port: 50004, proxy: 日本策略}
  - {name: MIXED-KR, type: mixed, port: 50005, proxy: 韩国策略}
  - {name: MIXED-EU, type: mixed, port: 50006, proxy: 欧盟策略}
  - {name: MIXED-OT, type: mixed, port: 50007, proxy: 冷门策略}

# 3 核心配置
# 3.1 基础配置
mode: rule
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
tproxy-port: 7895
ipv6: true
allow-lan: true
unified-delay: true
tcp-concurrent: true
log-level: warning
bind-address: '*'
find-process-mode: 'always'
keep-alive-interval: 15
keep-alive-idle: 600
# global-client-fingerprint: chrome

# 3.2 认证配置
authentication:
  - mihomo:mihomo
skip-auth-prefixes:
  - 192.168.50.0/24
  - 192.168.31.0/24
  - 192.168.100.0/24
  - 127.0.0.1/8

# 3.3 实验性功能
experimental:
  quic-go-disable-gso: true  
     
# 3.4管理面板配置
external-ui-url: https://github.com/Zephyruso/zashboard/releases/latest/download/dist.zip
external-ui-name: zashboard
external-ui: ui
external-controller: 127.0.0.1:9090
secret: mihomo

# 3.5 配置存储
profile:
  store-selected: true
  store-fake-ip: true

# 3.6 流量嗅探
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# 3.7 TUN模式配置
tun:
  enable: false
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true

# 3.8本地静态域名映射表(优先级最高,用来强制把某个域名解析到指定 IP,不走 DNS、不经过规则判断)
hosts:
  "epdg.epc.mnc010.mcc234.pub.3gppnetwork.org": [87.194.8.8, 87.194.88.8, 87.194.89.8, 87.194.9.8]
  services.googleapis.cn: services.googleapis.com
  cn.bing.com: www4.bing.com
  dns.alidns.com: [223.5.5.5, 223.6.6.6, 2400:3200::1, 2400:3200:baba::1]
  doh.pub: [1.12.12.12, 1.12.12.21, 120.53.53.53]
  dns.google: [8.8.8.8, 8.8.4.4, 2001:4860:4860::8888, 2001:4860:4860::8844]
  cloudflare-dns.com: [1.1.1.1, 1.0.0.1, 2606:4700:4700::1111, 2606:4700:4700::1001]
    
# 3.9 DNS配置
dns:
  enable: true
  ipv6: true
  use-hosts: true
  listen: 0.0.0.0:1053
  fake-ip-range: 198.18.0.1/16
  fake-ip-range6: fdfe:dcba:9876::1/64  
  enhanced-mode: fake-ip
  respect-rules: true
  fake-ip-filter-mode: blacklist  
  nameserver:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    #- https://dns.alidns.com/dns-query
    #- https://doh.pub/dns-query
  proxy-server-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fake-ip-filter:          #本条按需启用,如果开启了rule-set项,对应“6 规则集”的项目也需同时启用
    - rule-set:fakeip-filter
    - rule-set:private
    - rule-set:cn
    - '+.pub.3gppnetwork.org'
    - "+.bing.com"
    - +.miwifi.com
    - +.docker.io
    - +.market.xiaomi.com
    - +.push.apple.com

