# 5 规则路由 (按照从上往下的顺序遍历,优先命中上位规则,规则重复无影响,修改顺序会影响分流效果)
rules: 
  # 5.1 拦截规则(按需启用,可禁用拦截,不影响使用效果)
  - RULE-SET,category-ads-all,REJECT    # 轻量化广告拦截,与秋风广告配合使用,同时启用category-ads-all和AWAvenueAds,禁用anti-AD广告过滤列表
  - RULE-SET,AWAvenueAds,REJECT         # 秋风广告过滤列表
  #- RULE-SET,anti-ad,REJECT             # anti-AD广告过滤列表(较为全面的广告过滤列表,几乎涵盖AWAvenueAds和category-ads-all等过滤列表,但有误杀情况)
  - AND,((NETWORK,UDP),(DST-PORT,443),(NOT,((OR,((RULE-SET,cn),(RULE-SET,cn_IP,no-resolve)))))),REJECT

  # 5.2 特殊设置:192.168.50.101 ~ 199 所有设备走直连（本条规则解决内网大部分设备不需代理，如智能家居设备，负责DHCP的路由器的DHCP范围需设置为192.168.50.101 ~ 199，视个人需求修订）
  - SRC-IP-CIDR,192.168.50.101/32,DIRECT,no-resolve
  - SRC-IP-CIDR,192.168.50.102/31,DIRECT,no-resolve
  - SRC-IP-CIDR,192.168.50.104/30,DIRECT,no-resolve
  - SRC-IP-CIDR,192.168.50.108/30,DIRECT,no-resolve
  - SRC-IP-CIDR,192.168.50.112/28,DIRECT,no-resolve
  - SRC-IP-CIDR,192.168.50.128/26,DIRECT,no-resolve
  - SRC-IP-CIDR,192.168.50.192/29,DIRECT,no-resolve
  
  # 5.3 网设备(192.168.50.58)部分代理,其余直连
  - RULE-SET,My_Proxy,默认代理
  - RULE-SET,docker,Docker   # 群晖会无故连docker跑流量,需要时才开启代理,无此项需求的删除掉,并删除4.1 业务策略组相应分组
  - SRC-IP-CIDR,192.168.50.58/32,DIRECT,no-resolve
  #- SRC-IP-SUFFIX,::abcd:1234:efgh:5678/64,DIRECT,no-resolve  #某内网设备通过IPV6地址实现部分代理其余直连，由于路由器重启后IPV6前四段会变化，但后四段是根据MAC地址生成的，匹配后缀即可

  # 5.4 域名规则
  - RULE-SET,My_Direct,直接连接                               # 自定义直连域名
  - RULE-SET,private,直接连接                                 # 私有域名
  - RULE-SET,private_IP,直接连接,no-resolve                   # 内网 / 保留 IP(127/8、192.168/16…)
  - RULE-SET,Custom_Direct_Domain,直接连接                    # 自定义直连域名
  - RULE-SET,Custom_Direct_IP,直接连接,no-resolve             # 自定义直连IP
  - RULE-SET,Custom_Direct_Port,直接连接                      # 自定义直连端口
  - RULE-SET,Custom_Proxy_Domain,默认代理                     # 自定义代理域名
  - RULE-SET,Custom_Proxy_IP,默认代理,no-resolve              # 自定义代理IP
  - RULE-SET,bing@cn,直接连接                                  # bing中国
  - RULE-SET,google-cn,直接连接                                # Google中国服务
  - RULE-SET,category-games@cn,直接连接                        # 国内游戏
  - RULE-SET,Steam_CDN_Domain,直接连接                        # Steam CDN
  - RULE-SET,Steam_CDN_IP,直接连接,no-resolve                 # Steam CDN
  - RULE-SET,category-game-platforms-download,直接连接         # 游戏平台下载
  - RULE-SET,category-public-tracker,直接连接                  # BT Tracker
  - RULE-SET,category-pt,直接连接                              # PT站
  - RULE-SET,category-communication,即时通讯                   # 即时通讯(含telegram、WhatsApp、clubhouse等,若需精简,可以将注释掉"4.1 业务策略组"中相应的分组)
  - RULE-SET,category-social-media-!cn,社交媒体                # 国外社交媒体(含instagram、facebook、twitter、mixi等,若需精简,可以将注释掉"4.1 业务策略组"中相应的分组)
  - RULE-SET,google-gemini,Gemini                             # Gemini(在category-ai-!cn已含Gemini,若需精简,可以将注释掉本条规则及"4.1 业务策略组"中相应的分组)
  - RULE-SET,anthropic,Claude                                 # Cloude(在category-ai-!cn已含Cloude,若需精简,可以将注释掉本条规则及"4.1 业务策略组"中相应的分组)
  - RULE-SET,openai,ChatGPT                                   # OpenAI(在category-ai-!cn已含openai,如需单独分流,可启用本条规则,同时也启用"4.1 业务分组"中的ChatGPT)
  - RULE-SET,bing,Bing                                        # bing (含copilot,category-ai-!cn中也含了copilot,在使用edge浏览器时,后台会启用copilot产生流量,需要时开启代理)
  - RULE-SET,category-ai-!cn,AI服务                           # AI服务(国外AI兜底,含openai、gemini、copilot、claude等)
  - RULE-SET,github,Github                                    # GitHub
  - RULE-SET,category-speedtest,网络测试                       # 测速工具
  - RULE-SET,test-ipv6,网络测试                                # 测速工具
  - RULE-SET,youtube,油管视频                                  # YouTube
  - RULE-SET,biliintl,默认代理                                 # 哔哩哔哩海外版
  - RULE-SET,apple-cn,直接连接                                 # 苹果中国
  - RULE-SET,apple-tvplus,Apple TV+                           # Apple TV+
  - RULE-SET,apple,苹果服务                                    # 苹果服务
  - RULE-SET,onedrive,OneDrive                                # OneDrive
  - RULE-SET,microsoft@cn,直接连接                             # 微软中国
  - RULE-SET,microsoft,微软服务                                # 微软服务
  - RULE-SET,googlefcm,谷歌FCM                                 # Google FCM推送
  - RULE-SET,google,谷歌服务                                   # Google服务
  - RULE-SET,tiktok,TikTok                                     # TikTok
  - RULE-SET,netflix,奈飞视频                                  # Netflix
  - RULE-SET,disney,迪士尼+                                    # Disney+
  - RULE-SET,hbo,HBO                                          # HBO
  - RULE-SET,primevideo,Prime Video                           # Prime Video
  - RULE-SET,category-emby,Emby                               # Emby
  - RULE-SET,spotify,Spotify                                  # Spotify
  - RULE-SET,bahamut,Bahamut                                  # 巴哈姆特
  - RULE-SET,steam@cn,直接连接                                 # Steam国区
  - RULE-SET,category-games-cn,直接连接                        # 国区游戏平台
  - RULE-SET,category-games,游戏平台                           # 游戏平台(含category-games-cn、Steam)
  - RULE-SET,category-entertainment,国外娱乐                   # 国外娱乐(含youtube、tiktok、bahamut、primevideo、netflix、disney、apple-tvplus、hbo、category-games-!cn、tmdb、imdb等,若需精简,可以注释掉5.4相应的规则及"4.1 业务策略组"中对应的分组,最终到此规则兜底)
  - RULE-SET,category-ecommerce,国外电商                       # 国外电商
  - RULE-SET,category-cryptocurrency,加密货币                  # 加密货币(大部分在gfw中)
  - RULE-SET,gfw,默认代理                                      # GFW列表(主要规则,被墙列表)
  - RULE-SET,telegram_IP,即时通讯,no-resolve                   # Telegram IP
  - RULE-SET,twitter_IP,社交媒体,no-resolve                    # Twitter IP
  - RULE-SET,facebook_IP,社交媒体,no-resolve                   # Facebook IP
  - RULE-SET,google_IP,谷歌服务,no-resolve                     # Google IP
  - RULE-SET,netflix_IP,奈飞视频,no-resolve                    # Netflix IP
  - RULE-SET,geolocation-!cn,默认直连                          # 非中国域名(本条主要是境外域名,涵盖gfw被墙域名,其余几乎未被墙,前面gfw滤掉了被墙域名,这里默认直连,视连接情况切换代理)
  - RULE-SET,cloudflare_IP,默认直连,no-resolve                 # cloudflare(geolocation-!cn已包含cloudflare,这里IP补充)
  - RULE-SET,cloudfront_IP,默认直连,no-resolve                 # 亚马逊旗下CDN(同上IP补充)
  - RULE-SET,fastly_IP,默认直连,no-resolve                     # FSLY CDN(同上IP补充)
  - RULE-SET,cn,直接连接                                       # 中国域名
  - RULE-SET,cn_IP,直接连接,no-resolve                         # 中国IP
  - RULE-SET,Custom_Port_Direct,非标端口                       # 非标端口
  - MATCH,漏网之鱼                                             # 漏网之鱼

