# ==========================================================
# dns（从源文件直接提取）
# ----------------------------------------------------------
# 原始 DNS 配置，默认注释不启用。
# 如只需修改部分字段，直接写需要修改的键值即可（默认合并，不影响其他字段）。
# 如需完整替换 DNS 配置，使用 dns!: 操作符。
# ==========================================================
#
# dns:
#   direct-nameserver:
#   - https://dns.alidns.com/dns-query
#   - https://doh.pub/dns-query
#   enable: true
#   enhanced-mode: fake-ip
#   fake-ip-filter:
#   - rule-set:fakeip-filter
#   - rule-set:private
#   - rule-set:cn
#   - +.pub.3gppnetwork.org
#   - +.bing.com
#   - +.miwifi.com
#   - +.docker.io
#   - +.market.xiaomi.com
#   - +.push.apple.com
#   fake-ip-filter-mode: blacklist
#   fake-ip-range: 198.18.0.1/16
#   fake-ip-range6: fdfe:dcba:9876::1/64
#   ipv6: true
#   listen: 0.0.0.0:1053
#   nameserver:
#   - https://cloudflare-dns.com/dns-query
#   - https://dns.google/dns-query
#   proxy-server-nameserver:
#   - https://dns.alidns.com/dns-query
#   - https://doh.pub/dns-query
#   respect-rules: true
#   use-hosts: true
